<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CheckList DC KOINOTI NAV</title>
<!-- SheetJS для Excel -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 20px; background: #e9edf2; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 0; table-layout: fixed; background: white; border-radius: 0 0 10px 10px; overflow: hidden; box-shadow: 0 4px 9px rgba(0,0,0,0.07); }
  th, td { border: 1px solid #b4bcc7; padding: 8px 5px; vertical-align: middle; }
  
  /* Ширина столбцов: пункт 35%, статус 105px, комментарий 40% */
  th:first-child, td:first-child { width: 35px; text-align: center; background-color: #f0f4fa; font-weight: 600; }
  th:nth-child(2), td:nth-child(2) { width: 35%; }
  th:nth-child(3), td:nth-child(3) { width: 105px; text-align: center; }
  th:nth-child(4), td:nth-child(4) { width: 40%; }
  
  select, input { width: 100%; box-sizing: border-box; padding: 6px 5px; border: 1px solid #8f9bae; border-radius: 6px; font-size: 0.9rem; background: white; }
  select { cursor: pointer; background-color: #ffffff; font-weight: 500; }
  button { padding: 8px 16px; margin: 5px 5px 0 0; border: none; border-radius: 30px; background-color: #0b4b7a; color: white; font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,30,60,0.2); transition: 0.15s; }
  button:hover { background-color: #1f5e8f; transform: scale(1.02); }
  .section-title { font-weight: 700; font-size: 1.2rem; color: white; padding: 12px 18px; border-radius: 12px 12px 0 0; background: linear-gradient(145deg, #1e3b5c, #2b5475); border-bottom: 2px solid gold; }
  .section-container { margin-bottom: 28px; border-radius: 12px; }
  .flex-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; background: white; padding: 16px 22px; border-radius: 40px; box-shadow: 0 4px 10px rgba(0,20,40,0.1); margin-bottom: 20px; border: 1px solid #ccd7e6; }
  .banner { background: linear-gradient(135deg, #022b46, #124e77); color: white; padding: 22px 20px; border-radius: 50px; text-align: center; margin-bottom: 25px; border: 1px solid #99c7f0; }
  .banner h1 { margin: 0; font-size: 30px; }
  .excel-buttons { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; margin-bottom: 15px; }
  .status-ok { background-color: #1f7840; color: white; font-weight: 700; border-radius: 20px; padding: 5px; }
  .status-notok { background-color: #b6492e; color: white; font-weight: 700; border-radius: 20px; padding: 5px; }
  .status-fail { background-color: #c06618; color: white; font-weight: 700; border-radius: 20px; padding: 5px; }
  
  /* Сводная таблица */
  #summary-table { margin-bottom: 25px; min-width: 320px; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 8px 15px rgba(0,20,40,0.15); border: 2px solid #fff; }
  #summary-table th { background: linear-gradient(145deg, #1e3f5c, #0b2b40); color: white; padding: 12px 15px; border-bottom: 3px solid #ffb347; }
  #summary-table td { font-weight: 800; font-size: 1.8rem; color: #022b46; padding: 12px 10px; text-align: center; }
  #summary-table td:first-child { color: #1f7840; } 
  #summary-table td:nth-child(2) { color: #b6492e; } 
  #summary-table td:last-child { color: #c06618; } 
  
  #section-select { width: 320px; padding: 10px 16px; border-radius: 40px; border: 1px solid #2a6090; }
  .fusion-badge { background: #ffd966; color: #1d3b5c; border-radius: 30px; padding: 5px 18px; font-weight: bold; display: inline-block; margin-left: 15px; border: 1px solid #b68b30; }
  
  /* Google Sheets панель */
  .gsheet-panel { background: linear-gradient(135deg, #0F9D58, #0b7e44); color: white; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
  .gsheet-panel input { flex: 1; min-width: 300px; padding: 8px 15px; border: none; border-radius: 40px; font-size: 0.9rem; }
  .gsheet-panel button { background: white; color: #0F9D58; margin: 0; }
  .gsheet-panel button:hover { background: #f0f0f0; }
  
  /* Модальное окно */
  .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
  .modal-content { background: white; margin: 50px auto; padding: 20px; width: 80%; max-width: 900px; max-height: 80vh; overflow-y: auto; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { margin: 0; color: #022b46; }
  .close-btn { font-size: 30px; cursor: pointer; color: #666; }
  .close-btn:hover { color: #000; }
  .report-item { padding: 15px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; background: #f8f9fa; }
  .report-item:hover { background: #e9ecef; transform: translateX(5px); }
  .report-date { font-weight: bold; color: #0b4b7a; font-size: 1.1rem; }
  .report-shift { color: #666; margin-left: 10px; }
  .report-people { color: #888; font-size: 0.9rem; margin-top: 5px; }
</style>
</head>
<body>

<div class="banner">
  <h1>⚡ CheckList DC KOINOTI NAV ⚡</h1>
  <p>приём/сдача смены • 1 корпус • интегрированная инфраструктура</p>
</div>

<!-- Сводная таблица -->
<table id="summary-table">
  <thead><tr><th>✅ OK</th><th>⚠️ NOT OK</th><th>🔥 Авария</th></tr></thead>
  <tbody><tr><td id="sum-ok">0</td><td id="sum-notok">0</td><td id="sum-fail">0</td></tr></tbody>
</table>

<!-- Панель смены -->
<div class="flex-row">
  <label>📅 Дата: <input type="date" id="date" style="width:140px;" value="2025-04-02"></label>
  <label>🕒 Смена: 
    <select id="shift" style="width:190px;">
      <option value="Дневная (8:30-18:30)">Дневная (8:30-18:30)</option>
      <option value="Ночная (18:30-8:30)" selected>Ночная (18:30-8:30)</option>
    </select>
  </label>
  <label>👤 Сдающий: <input type="text" id="sender" placeholder="ФИО" style="width:150px;"></label>
  <label>👥 Принимающий: <input type="text" id="receiver" placeholder="ФИО" style="width:150px;"></label>
  <span class="fusion-badge">KOINOTI NAV</span>
</div>

<!-- Google Sheets панель (адаптирована под ваш скрипт) -->
<div class="gsheet-panel">
  <span style="font-weight:700;">📊 Google Sheets:</span>
  <input type="text" id="sheet-id" placeholder="ID Google Sheets таблицы" value="1a0a_n0pD-EBc4ZZJZZk029cYtgkSOBVpYxlv2m4nmTU">
  <input type="text" id="script-url" placeholder="URL веб-приложения Apps Script" value="https://script.google.com/macros/s/AKfycbxywoNGpr6DTwocSAmIPSPxykDkusJjv2en_QAd2dj6vq8U9HjF_3j2q5J-SKw0egs3/exec" style="flex:2;">
  <button onclick="testScriptConnection()">🔌 Проверить скрипт</button>
  <button onclick="saveToGoogleSheet()" style="background:#FFD700; color:#0b4b7a;">💾 Сохранить в Google Sheets</button>
  <span id="gsheet-status" style="font-size:0.85rem; color:#e0ffe0;"></span>
</div>

<!-- Управление -->
<div class="flex-row" style="background:#deeaf5;">
  <label>📋 Выберите секцию: <select id="section-select" style="width:300px;"></select></label>
  <button onclick="addRowToSelectedSection()" style="background:#146b3a;">➕ Добавить пункт</button>
  <button onclick="resetToDefaultSections()" style="background:#7a4c29;">🔄 Сбросить к эталону</button>
  <button onclick="saveToCloud()" style="background:#4285F4;">☁️ Сохранить в облако</button>
  <button onclick="loadFromCloud()" style="background:#34A853;">📥 Загрузить из облака</button>
</div>

<div class="excel-buttons">
  <button onclick="downloadExcel()">⬇️ Скачать Excel (XLSX)</button>
  <input type="file" id="import-file" accept=".xlsx,.xls" onchange="importExcel(event)" style="border:1px solid #2a5f8a; padding:6px 15px; border-radius:40px;">
</div>

<div id="checklist-container"></div>

<!-- Модальное окно для отчетов из облака -->
<div id="cloudReportsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>☁️ Отчеты из облака</h2>
      <span class="close-btn" onclick="closeCloudModal()">&times;</span>
    </div>
    <div id="cloudReportsList"></div>
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
      <button onclick="exportToFile()" style="background:#4B0082;">📤 Экспорт в файл</button>
      <input type="file" id="import-file-reports" accept=".json" onchange="importFromFile(event)" style="display: none;">
      <button onclick="document.getElementById('import-file-reports').click()" style="background:#9370DB;">📥 Импорт из файла</button>
      <button onclick="clearAllCloudReports()" style="background:#8B0000;">🗑️ Очистить все</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ======== НАСТРОЙКИ JSONBIN (облако) ========
  const JSONBIN_API_KEY = '$2a$10$X4ZQ9X4ZQ9X4ZQ9X4ZQ9Xu'; // Публичный ключ для демо
  const JSONBIN_BIN_ID = '67c8a9b5acd3cb34a8f2b4c6'; // ID вашего облачного хранилища
  const LOCAL_STORAGE_KEY = 'dc_checklist_reports';
  
  // ======== ЭТАЛОННЫЕ СЕКЦИИ ========
  const defaultSections = [ ... ]; // полное определение см. в предыдущей версии (сокращено для читаемости)

  let sections = defaultSections.map(sec => ({ ...sec, items: [...sec.items] }));

  // ... остальные функции (lightenColor, applyStatusClass, renumberTable, renderAllSections, updateSummary, addRowToSelectedSection, resetToDefaultSections, downloadExcel, importExcel) полностью совпадают с предыдущей версией.
  // Для экономии места здесь приведены только новые функции для Google Apps Script.
  // Полный код смотрите в приложенном файле или объедините с ранее предоставленным.

  // ======== НОВЫЕ ФУНКЦИИ ДЛЯ ОТПРАВКИ В ВАШ СКРИПТ ========

  // Функция сбора данных из чек-листа
  function collectChecklistData() {
    const sectionsData = [];
    document.querySelectorAll('.section-container').forEach(container => {
      const sectionName = container.querySelector('.section-title').textContent;
      const items = [];
      container.querySelectorAll('tbody tr').forEach(row => {
        items.push({
          text: row.cells[1].querySelector('input').value,
          status: row.cells[2].querySelector('select').value,
          comment: row.cells[3].querySelector('input').value
        });
      });
      sectionsData.push({ name: sectionName, items });
    });

    const stats = {
      ok: parseInt(document.getElementById('sum-ok').textContent) || 0,
      notok: parseInt(document.getElementById('sum-notok').textContent) || 0,
      fail: parseInt(document.getElementById('sum-fail').textContent) || 0
    };

    return {
      timestamp: new Date().toISOString(),
      date: document.getElementById('date').value,
      shift: document.getElementById('shift').value,
      sender: document.getElementById('sender').value,
      receiver: document.getElementById('receiver').value,
      sheetId: document.getElementById('sheet-id').value.trim(),
      stats: stats,
      sections: sectionsData
    };
  }

  // Проверка соединения со скриптом (тестовая отправка)
  window.testScriptConnection = function() {
    const scriptUrl = document.getElementById('script-url').value.trim();
    if (!scriptUrl) {
      alert('Введите URL веб-приложения');
      return;
    }

    const statusEl = document.getElementById('gsheet-status');
    statusEl.textContent = '⏳ Проверка...';

    // Отправляем минимальный тестовый пакет
    fetch(scriptUrl, {
      method: 'POST',
      mode: 'no-cors', // если скрипт не возвращает нужные заголовки
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ test: true, message: 'Проверка связи' })
    })
    .then(() => {
      // При no-cors мы не можем прочитать ответ, но если запрос дошел - хорошо
      statusEl.textContent = '✅ Скрипт доступен (no-cors)';
    })
    .catch(error => {
      statusEl.textContent = '❌ Ошибка: ' + error.message;
    });
  };

  // Сохранение данных в Google Sheets через ваш скрипт
  window.saveToGoogleSheet = function() {
    const scriptUrl = document.getElementById('script-url').value.trim();
    if (!scriptUrl) {
      alert('Введите URL веб-приложения');
      return;
    }

    if (!document.getElementById('sender').value || !document.getElementById('receiver').value) {
      alert('⚠️ Заполните ФИО сдающего и принимающего');
      return;
    }

    const data = collectChecklistData();
    const statusEl = document.getElementById('gsheet-status');
    statusEl.textContent = '⏳ Отправка данных...';

    fetch(scriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(response => {
      if (!response.ok) throw new Error(`HTTP error ${response.status}`);
      return response.text().then(text => {
        try { return JSON.parse(text); } catch { return text; }
      });
    })
    .then(result => {
      statusEl.innerHTML = '✅ Данные успешно отправлены в Google Sheets';
      console.log('Ответ скрипта:', result);
    })
    .catch(error => {
      statusEl.textContent = '❌ Ошибка: ' + error.message;
      alert('Не удалось отправить данные. Подробности в консоли.');
    });
  };

  // ... остальные функции (saveToCloud, loadFromCloud, showCloudReportsList, loadCloudReport, exportToFile, importFromFile, clearAllCloudReports, closeCloudModal) остаются без изменений.

  // Инициализация
  renderAllSections();
  
  // Восстанавливаем сохранённые значения
  const savedSheetId = localStorage.getItem('google_sheet_id');
  if (savedSheetId) document.getElementById('sheet-id').value = savedSheetId;
  const savedScriptUrl = localStorage.getItem('google_script_url');
  if (savedScriptUrl) document.getElementById('script-url').value = savedScriptUrl;

  // Сохраняем в localStorage при изменении полей
  document.getElementById('sheet-id').addEventListener('change', function() {
    localStorage.setItem('google_sheet_id', this.value);
  });
  document.getElementById('script-url').addEventListener('change', function() {
    localStorage.setItem('google_script_url', this.value);
  });
})();
</script>
<div style="margin-top:35px; color:#2f4858; text-align:right; border-top:1px dashed #9bb7d4; padding-top:8px;">
  v9.0 • Прямая отправка на Google Apps Script
</div>
</body>
</html>
